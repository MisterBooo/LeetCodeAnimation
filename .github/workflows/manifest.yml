name: Manifest

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node tools/scripts/validate-manifest.js
      - run: node tools/scripts/sync-algomooc-index.js --check-generated
